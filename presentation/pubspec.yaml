name: flutter_ffi_presentation
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
resolution: workspace

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_monocypher:
    git: https://github.com/rmtmckenzie/flutter_monocypher.git
  cupertino_icons: ^1.0.8
  flutter_deck: ^0.28.1
  flutter_shaders_ui: ^1.0.4
  auto_size_text: ^3.0.0
  google_fonts: ^8.1.0
  flutter_deck_ws_client: ^0.3.0
  dart_frog: ^1.2.6
  # local deps
  mic_ffi: any
  audio_process: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
#
#dependency_overrides:
#  flutter_deck:
#    path: ../../../temp/flutter_deck/packages/flutter_deck

flutter:
  uses-material-design: true
  assets:
    - assets/headshot.jpg
    - assets/what/
    - assets/whatnow/
    - assets/why/
    - assets/how_to_monocypher/
    - assets/ffi_desktop/

  shaders:
    - shaders/aurora_optimized.frag
